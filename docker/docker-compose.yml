version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dailyspark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dailyspark
      POSTGRES_PASSWORD: dailyspark
      POSTGRES_DB: dailyspark
    ports:
      - "5432:5432"
    volumes:
      - dailyspark_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailyspark"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dailyspark-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: dailyspark-api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://dailyspark:dailyspark@postgres:5432/dailyspark?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: dailyspark-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  dailyspark_pg_data:
